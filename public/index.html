<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>居酒屋テトリス - 入口</title>
    <style>
        body { background-color: #222; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; }
        .container { background: #333; padding: 20px; border-radius: 8px; width: 90%; max-width: 320px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 6px; border: 1px solid #777; background: #222; color: white; box-sizing: border-box; text-align: center; font-size: 16px;}
        button { width: 100%; padding: 12px; font-weight: bold; background-color: #28a745; color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="color: #00ffcc; font-size: 24px; margin-top: 0;">居酒屋テトリス</h1>
        <p style="font-size: 14px; color: #ddd;">遊ぶための名前を入力してください</p>
        
        <form id="login-form">
            <input type="text" id="player-name" placeholder="あなたの名前" required autocomplete="off">
            <button type="submit">ロビーへ入室</button>
        </form>
    </div>

    <script>
        // URLから部屋番号を取得（なければ新規作成）
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room') || Math.random().toString(36).substring(2, 8);

        // IDの生成と保存
        if (!localStorage.getItem('izakaya_client_id')) {
            localStorage.setItem('izakaya_client_id', 'user_' + Math.random().toString(36).substr(2, 9));
        }

        // フォーム送信でロビーへ遷移
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault(); // リロードをブロック
            const name = document.getElementById('player-name').value.trim();
            if (!name) return;
            
            // 名前を記憶して、ロビー画面へワープ！
            localStorage.setItem('izakaya_player_name', name);
            window.location.href = `/lobby.html?room=${roomId}`;
        });
    </script>
</body>
</html>
