<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>待機ロビー - 居酒屋テトリス</title>
    <style>
        body { background-color: #222; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .panel { background: #333; padding: 15px; border-radius: 8px; width: 100%; max-width: 340px; box-sizing: border-box; margin-bottom: 10px; }
        .action-btn { padding: 8px 12px; font-weight: bold; color: white; border: none; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; touch-action: manipulation; }
        .action-btn:disabled { background-color: #555; color: #888; cursor: not-allowed; }
        .vote-btn { background: #444; color: white; border: 2px solid #555; padding: 10px; width: 100%; margin-bottom: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; touch-action: manipulation; }
        .vote-btn.selected { background: #ff5555; border-color: #fff; }
    </style>
</head>
<body>
    <div style="background:#444; padding:5px 10px; border-radius:5px; font-size:11px; margin-bottom:10px;">
        招待URL: <span id="room-url" style="color:#00ffcc;"></span>
        <button onclick="navigator.clipboard.writeText(window.location.href); alert('コピーしました');" style="margin-left:5px;">コピー</button>
    </div>

    <div id="lobby-view" class="panel">
        <h2 style="color: #00ffcc; text-align: center; margin-top: 0;">待機ロビー</h2>
        <button onclick="window.location.href='/index.html?room=' + roomId" style="background:#555; color:white; border:none; padding:8px; border-radius:3px; font-size:12px; margin-bottom:10px; width:100%; cursor: pointer;">✏️ 名前を変更する</button>
        
        <ul id="player-list" style="list-style: none; padding: 0;"></ul>

        <div id="host-controls" style="display: none; background: #444; padding: 10px; border-radius: 5px; margin-top: 15px;">
            <div style="color:#ffcc00; text-align:center; font-weight:bold; margin-bottom:5px;">👑 ホストメニュー</div>
            <button id="start-vote-btn" class="action-btn" style="background: #007bff;" disabled>全員の準備を待つ...</button>
        </div>
    </div>

    <div id="voting-view" class="panel" style="display: none;">
        <h2 style="color: #ff5555; text-align: center; margin-top: 0;">犠牲者投票</h2>
        <p style="font-size: 12px; text-align: center;">テトリスをプレイする人を1人選んでください</p>
        <div id="vote-buttons"></div>
        <button id="confirm-vote-btn" class="action-btn" style="background-color: #28a745; margin-top: 15px; font-size: 15px;" disabled onclick="confirmVote()">🔒 投票を確定する</button>
        <div id="vote-status" style="text-align: center; margin-top: 15px; color: #00ffcc; font-weight: bold;"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const roomId = urlParams.get('room');
        const myClientId = localStorage.getItem('izakaya_client_id');
        const myName = localStorage.getItem('izakaya_player_name');

        if (!roomId || !myClientId || !myName) window.location.href = '/index.html';

        document.getElementById('room-url').innerText = window.location.href;
        socket.emit('joinRoom', roomId);

        let players = [];
        let votes = {};
        let gameMode = 'LOBBY';
        let votedCompletes = []; 
        let receivedSync = false;

        function broadcast() {
            socket.emit('updateState', { players, votes, gameMode, votedCompletes });
            renderLobby(); 
        }

        let initTimeout = setTimeout(() => {
            if (!receivedSync) {
                players = [{ id: myClientId, name: myName, isReady: false }];
                gameMode = 'LOBBY';
                votedCompletes = [];
                broadcast();
            }
        }, 1500); 

        socket.on('syncState', (state) => {
            receivedSync = true;
            clearTimeout(initTimeout); 

            if (!state || Object.keys(state).length === 0) {
                let me = players.find(p => p.id === myClientId);
                if (!me) { players.push({ id: myClientId, name: myName, isReady: false }); }
                broadcast();
                return;
            }

            players = state.players || [];
            votes = state.votes || {};
            gameMode = state.gameMode || 'LOBBY';
            votedCompletes = state.votedCompletes || [];

            if (gameMode === 'TETRIS' || gameMode === 'IZAKAYA') {
                window.location.href = `/game.html?room=${roomId}`;
                return;
            }

            let me = players.find(p => p.id === myClientId);
            if (!me) {
                players.push({ id: myClientId, name: myName, isReady: false });
                broadcast();
            } else if (me.name !== myName) {
                me.name = myName; 
                broadcast();
            }

            renderLobby();
            
            // ★修正：誰かが状態を更新するたびにホストが完了チェックを行う
            checkVotingComplete();
        });

        function toggleReady() {
            const me = players.find(p => p.id === myClientId);
            if (me) {  me.isReady = !me.isReady; broadcast(); }
        }

        window.castVote = function(targetId) {
            if (votedCompletes.includes(myClientId)) return;
            votes[myClientId] = targetId;
            broadcast();
        }

        window.confirmVote = function() {
            if (!votes[myClientId]) return; 
            if (votedCompletes.includes(myClientId)) return; 

            votedCompletes.push(myClientId); 
            broadcast();
            checkVotingComplete(); 
        };

        function checkVotingComplete() {
            const isHost = players.length > 0 && players[0].id === myClientId;
            
            // ホストの画面で全員の確定を確認した場合
            if (isHost && votedCompletes.length === players.length && gameMode === 'VOTING') {
                let counts = {};
                for (let v in votes) counts[votes[v]] = (counts[votes[v]] || 0) + 1;
                let max = 0; let winners = [];
                for (let id in counts) {
                    if (counts[id] > max) { max = counts[id]; winners = [id]; }
                    else if (counts[id] === max) winners.push(id);
                }
                const tetrisPlayerId = winners.sort()[0];

                gameMode = 'TETRIS'; // 先にローカルのモードを変更

                socket.emit('updateState', { 
                    players, 
                    tetrisPlayerId, 
                    gameMode: 'TETRIS', 
                    gameTime: 0, gameLevel: 1, currentDropSpeed: 800,
                    stockCount: 0, excludedMinos: []
                });

                // ★修正：ホスト自身も強制的にゲーム画面へワープさせる
                window.location.href = `/game.html?room=${roomId}`;
            }
        }

        function renderLobby() {
            const isHost = players.length > 0 && players[0].id === myClientId;
            
            if (gameMode === 'LOBBY') {
                document.getElementById('lobby-view').style.display = 'block';
                document.getElementById('voting-view').style.display = 'none';

                const ul = document.getElementById('player-list');
                ul.innerHTML = '';
                let allReady = players.length > 0;

                players.forEach(p => {
                    const li = document.createElement('li');
                    li.style.display = 'flex'; li.style.justifyContent = 'space-between'; li.style.marginBottom = '10px'; li.style.alignItems = 'center';
                    
                    let statusHtml = '';
                    if (p.id === myClientId) {
                        if (p.isReady) {
                            statusHtml = `<div style="display:flex; align-items:center; gap:10px;"><span style="color:#00ffcc; font-weight:bold;">✅ 準備OK!</span><button onclick="toggleReady()" style="background:#555; color:white; border:none; padding:6px 10px; border-radius:4px; font-weight:bold; cursor:pointer;">取消</button></div>`;
                        } else {
                            statusHtml = `<button onclick="toggleReady()" style="background:#007bff; color:white; border:none; padding:6px 15px; border-radius:4px; font-weight:bold; cursor:pointer;">準備完了にする</button>`;
                        }
                    } else {
                        statusHtml = `<span style="color:${p.isReady ? '#00ffcc' : '#888'}; font-weight:bold;">${p.isReady ? '✅ 準備OK' : '⏳ 準備中...'}</span>`;
                    }

                    li.innerHTML = `<span>${p.id === players[0].id ? '👑' : ''} ${p.name}</span> ${statusHtml}`;
                    ul.appendChild(li);
                    if (!p.isReady) allReady = false;
                });

                if (isHost) {
                    document.getElementById('host-controls').style.display = 'block';
                    const startBtn = document.getElementById('start-vote-btn');
                    if (allReady) {
                        startBtn.disabled = false; startBtn.innerText = '▶ 投票画面へ';
                        startBtn.onclick = () => { gameMode = 'VOTING'; votes = {}; votedCompletes = []; broadcast(); };
                    } else {
                        startBtn.disabled = true; startBtn.innerText = '全員の準備を待つ...';
                    }
                } else {
                    document.getElementById('host-controls').style.display = 'none';
                }
            } else if (gameMode === 'VOTING') {
                document.getElementById('lobby-view').style.display = 'none';
                document.getElementById('voting-view').style.display = 'block';

                const myConfirmed = votedCompletes.includes(myClientId);
                const btnContainer = document.getElementById('vote-buttons');
                btnContainer.innerHTML = '';
                players.forEach(p => {
                    const btn = document.createElement('button');
                    btn.className = `vote-btn ${votes[myClientId] === p.id ? 'selected' : ''}`;
                    btn.innerText = p.name;
                    if (myConfirmed) {
                        btn.disabled = true; btn.style.cursor = 'not-allowed';
                    } else {
                        btn.onclick = () => castVote(p.id);
                    }
                    btnContainer.appendChild(btn);
                });

                const confirmBtn = document.getElementById('confirm-vote-btn');
                if (myConfirmed) {
                    confirmBtn.disabled = true; confirmBtn.innerText = '✅ 投票を確定しました'; confirmBtn.style.backgroundColor = '#555';
                } else {
                    if (votes[myClientId]) {
                        confirmBtn.disabled = false; confirmBtn.innerText = '🔒 投票を確定する'; confirmBtn.style.backgroundColor = '#28a745';
                    } else {
                        confirmBtn.disabled = true; confirmBtn.innerText = '👇 誰かを選択してください'; confirmBtn.style.backgroundColor = '#555';
                    }
                }
                document.getElementById('vote-status').innerText = `投票完了: ${votedCompletes.length} / ${players.length} 人`;
            }
        }
    </script>
</body>
</html>
